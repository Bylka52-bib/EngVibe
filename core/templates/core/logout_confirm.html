{% extends 'core/base.html' %}
{% block title %}Выход – EngVibe{% endblock %}
{% block body_class %}page-bento-form{% endblock %}
{% block content %}
<section class="page-shell bento-form-page">
    <div class="container container--narrow">
        <div class="bento-form-card surface-card bento-highlight bento-form-card--wide">
            <h1>Выйти из аккаунта?</h1>
            <p class="page-lead">Вы действительно хотите завершить сессию на этом устройстве?</p>
            <div class="bento-form-actions">
                <form method="post" action="{% url 'core:logout_do' %}" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-primary btn-pill">Да, выйти</button>
                </form>
                <a class="btn btn-outline-pink btn-pill" href="{% url 'core:profile' %}">Отмена</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}

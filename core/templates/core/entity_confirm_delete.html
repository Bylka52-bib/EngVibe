{% extends 'core/base.html' %}
{% block title %}{{ title }} - EngVibe{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block content %}
<section class="auth-wrap">
    <div class="container">
        <form method="post" class="auth-card">
            <h1>{{ title }}</h1>
            {% csrf_token %}
            <p>Вы уверены, что хотите удалить: {{ entity }}?</p>
            <div class="inline-actions">
                <button class="btn btn-primary btn-pill" type="submit">Да, удалить</button>
                <a class="btn btn-outline-pink btn-pill" href="{% if cancel_url %}{{ cancel_url }}{% else %}{% url 'core:teacher_panel' %}{% endif %}">Отмена</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
